<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Where I've Been</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app">
        <details id="timeline-shell" open>
            <summary>Timeline</summary>
            <div class="section-body">
                <div id="timeline-panel">
                    <div id="timeline-header">
                        <strong>Show trips up to year: <span id="year-value">All</span></strong>
                        <button id="show-all-btn" type="button">Show all</button>
                    </div>
                    <div id="slider-row">
                        <span id="year-min"></span>
                        <input type="range" id="year-slider">
                        <span id="year-max"></span>
                    </div>
                </div>
            </div>
        </details>

        <div id="main-content">
            <div id="trips-shell">
                <details id="trips-details" open>
                    <summary>Trips</summary>
                    <div class="section-body">
                        <div id="trips-panel">
                            <p>Click a trip to zoom in and replay the route.</p>
                            <div id="trip-list"></div>
                        </div>
                    </div>
                </details>
            </div>
            <div id="map"></div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
