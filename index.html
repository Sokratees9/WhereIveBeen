<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Where I've Been</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f8fafc;
    }

    #app {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    #sidebar {
      width: 320px;
      max-width: 40vw;
      overflow-y: auto;
      background: white;
      border-right: 1px solid #dbe1e8;
      padding: 16px;
      box-sizing: border-box;
    }

    #sidebar h1 {
      margin: 0 0 8px 0;
      font-size: 22px;
    }

    #sidebar p {
      margin: 0 0 16px 0;
      color: #475569;
      font-size: 14px;
    }

    #timeline-panel {
      margin-bottom: 18px;
      padding: 12px;
      border: 1px solid #dbe1e8;
      border-radius: 10px;
      background: #f8fafc;
    }

    #timeline-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
      color: #334155;
    }

    #slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    #year-min,
    #year-max {
      font-size: 13px;
      color: #475569;
      min-width: 36px;
      text-align: center;
    }

    #year-slider {
      flex: 1;
      margin: 0;
    }

    #show-all-btn {
      border: 1px solid #cbd5e1;
      background: white;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
    }

    #show-all-btn:hover {
      background: #f1f5f9;
    }

    .trip-button {
      display: block;
      width: 100%;
      text-align: left;
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid #dbe1e8;
      border-radius: 10px;
      background: #ffffff;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    }

    .trip-button:hover {
      background: #f8fafc;
      border-color: #94a3b8;
    }

    .trip-button.active {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .trip-title {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
      color: #0f172a;
    }

    .trip-meta {
      font-size: 13px;
      color: #475569;
      margin-bottom: 4px;
    }

    .trip-notes {
      font-size: 13px;
      color: #334155;
      margin-top: 6px;
    }

    #map {
      flex: 1;
      height: 100%;
      width: 100%;
    }

    .legend {
      background: white;
      padding: 10px 12px;
      line-height: 1.5;
      border-radius: 8px;
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.25);
    }

    .legend h4 {
      margin: 0 0 8px 0;
      font-size: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 8px;
      border: 1px solid #333;
      flex: 0 0 12px;
    }

    .popup-title {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .popup-subtitle {
      color: #444;
      margin-bottom: 8px;
    }

    .popup-notes {
      margin-top: 8px;
    }

    .route-highlight {
      filter: drop-shadow(0 0 4px rgba(0,0,0,0.35));
    }

    @media (max-width: 800px) {
      #app {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        max-width: 100%;
        height: 240px;
        border-right: none;
        border-bottom: 1px solid #dbe1e8;
      }
    }
  </style>
</head>
<body>
  <div id="timeline-panel">
    <div id="timeline-header">
      <strong>Show trips up to year: <span id="year-value">All</span></strong>
      <button id="show-all-btn" type="button">Show all</button>
    </div>

    <div id="slider-row">
      <span id="year-min"></span>
      <input type="range" id="year-slider" min="1990" max="2025" value="2025" step="1" />
      <span id="year-max"></span>
    </div>
  </div>
  <div id="app">
    <aside id="sidebar">
      <h1>Where I've Been</h1>
      <p>Click a trip to zoom in and replay the route.</p>
      <div id="trip-list"></div>
    </aside>
    <div id="map"></div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    const map = L.map("map").setView([50, 5], 4);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const markerColors = {
      start: "#0B6623",
      transit: "#6b7280",
      stopover: "#f59e0b",
      destination: "#2563eb"
    };

    const routeColors = [
      "#e11d48",
      "#16a34a",
      "#7c3aed",
      "#ea580c",
      "#0891b2",
      "#4f46e5"
    ];

    const tripLayers = [];
    let replayTimeouts = [];
    let activeReplayLine = null;

    function getMarkerColor(type) {
      return markerColors[type] || "#374151";
    }

    function escapeHtml(text) {
      if (text === null || text === undefined) return "";
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDisplayDate(dateString) {
      if (!dateString) return "Unknown";
      const date = new Date(dateString + "T00:00:00");
      return date.toLocaleDateString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function getTripDurationDays(startDate, endDate) {
      if (!startDate || !endDate) return null;

      const start = new Date(startDate + "T00:00:00");
      const end = new Date(endDate + "T00:00:00");

      if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) {
        return null;
      }

      const diffMs = end - start;
      const diffDays = Math.round(diffMs / (1000 * 60 * 60 * 24)) + 1;

      if (diffDays < 1) return null;
      return diffDays;
    }

    function buildPopup(trip, stop, stopIndex, totalStops) {
      const duration = getTripDurationDays(trip.startDate, trip.endDate);

      let html = `
        <div class="popup-title">${escapeHtml(stop.name)}</div>
        <div class="popup-subtitle">${escapeHtml(trip.title)}</div>
        <div><strong>Dates:</strong> ${escapeHtml(formatDisplayDate(trip.startDate))} → ${escapeHtml(formatDisplayDate(trip.endDate))}</div>
        <div><strong>Trip group:</strong> ${escapeHtml(trip.group || "Unknown")}</div>
        <div><strong>Stop type:</strong> ${escapeHtml(stop.type)}</div>
        <div><strong>Stop:</strong> ${stopIndex + 1} of ${totalStops}</div>
      `;

      if (duration) {
        html += `<div><strong>Duration:</strong> ${duration} day${duration === 1 ? "" : "s"}</div>`;
      }

      if (stop.nights) {
        html += `<div><strong>Nights:</strong> ${escapeHtml(stop.nights)}</div>`;
      }

      if (stop.notes) {
        html += `<div class="popup-notes"><strong>Stop notes:</strong> ${escapeHtml(stop.notes)}</div>`;
      }

      if (trip.notes) {
        html += `<div class="popup-notes"><strong>Trip notes:</strong> ${escapeHtml(trip.notes)}</div>`;
      }

      return html;
    }

    function createMarker(stop) {
      return L.circleMarker([stop.lat, stop.lng], {
        radius: 8,
        color: getMarkerColor(stop.type),
        fillColor: getMarkerColor(stop.type),
        fillOpacity: 0.85,
        weight: 2
      });
    }

    function addLegend() {
      const legend = L.control({ position: "bottomright" });

      legend.onAdd = function () {
        const div = L.DomUtil.create("div", "legend");
        div.innerHTML = `
          <h4>Stops</h4>
          <div class="legend-item">
            <span class="legend-swatch" style="background:${markerColors.start}"></span>
            Start/Finish
          </div>
          <div class="legend-item">
            <span class="legend-swatch" style="background:${markerColors.transit}"></span>
            Transit
          </div>
          <div class="legend-item">
            <span class="legend-swatch" style="background:${markerColors.stopover}"></span>
            Stopover
          </div>
          <div class="legend-item">
            <span class="legend-swatch" style="background:${markerColors.destination}"></span>
            Destination
          </div>
        `;
        return div;
      };

      legend.addTo(map);
    }

    function clearReplay() {
      replayTimeouts.forEach(timeoutId => clearTimeout(timeoutId));
      replayTimeouts = [];

      if (activeReplayLine) {
        map.removeLayer(activeReplayLine);
        activeReplayLine = null;
      }
    }

    function setActiveTripButton(tripIndex) {
      document.querySelectorAll(".trip-button").forEach((button, index) => {
        button.classList.toggle("active", index === tripIndex);
      });
    }

    function replayTrip(tripData, tripIndex) {
      clearReplay();
      setActiveTripButton(tripIndex);
    
      const stops = tripData.trip.stops || [];
      if (stops.length === 0) return;

      if (!map.hasLayer(tripData.layerGroup)) {
        tripData.layerGroup.addTo(map);
      }
    
      const bounds = L.latLngBounds(stops.map(stop => [stop.lat, stop.lng]));
      map.fitBounds(bounds, { padding: [40, 40] });
    
      const replayColor = routeColors[tripIndex % routeColors.length];
      activeReplayLine = L.polyline([], {
        color: replayColor,
        weight: 6,
        opacity: 0.9
      }).addTo(map);
    
      const pointsSoFar = [];
    
      tripData.markers.forEach((marker, stopIndex) => {
        const timeoutId = setTimeout(() => {
          const stop = stops[stopIndex];
          const point = [stop.lat, stop.lng];
          pointsSoFar.push(point);
    
          activeReplayLine.setLatLngs(pointsSoFar);
          map.panTo(point, { animate: true, duration: 0.75 });
          marker.openPopup();
        }, stopIndex * 900);
    
        replayTimeouts.push(timeoutId);
      });
    }

    function renderTripList(tripLayers) {
      const tripList = document.getElementById("trip-list");
      tripList.innerHTML = "";

      tripLayers.forEach((tripData, tripIndex) => {
        const trip = tripData.trip;
        const duration = getTripDurationDays(trip.startDate, trip.endDate);

        const button = document.createElement("button");
        button.className = "trip-button";
        button.type = "button";

        button.innerHTML = `
          <div class="trip-title">${escapeHtml(trip.title)}</div>
          <div class="trip-meta">${escapeHtml(formatDisplayDate(trip.startDate))} → ${escapeHtml(formatDisplayDate(trip.endDate))}</div>
          <div class="trip-meta">${duration ? `${duration} day${duration === 1 ? "" : "s"}` : "Duration unknown"} · ${escapeHtml(trip.group || "Unknown")}</div>
          <div class="trip-meta">${trip.stops.length} stop${trip.stops.length === 1 ? "" : "s"}</div>
          ${trip.notes ? `<div class="trip-notes">${escapeHtml(trip.notes)}</div>` : ""}
        `;

        button.addEventListener("click", () => replayTrip(tripData, tripData.tripIndex));
        tripList.appendChild(button);
      });
    }

    function getTripYear(trip) {
      if (trip.startDate) {
        const year = new Date(trip.startDate + "T00:00:00").getFullYear();
        if (!Number.isNaN(year)) return year;
      }

      if (trip.year) return trip.year;

      return null;
    }

    function getYearRange(trips) {
      const years = trips
        .map(getTripYear)
        .filter(year => year !== null);

      if (years.length === 0) {
        return { min: 1979, max: 2025 };
      }

      return {
        min: Math.min(...years),
        max: Math.max(...years)
      };
    }

    fetch("trips.json")
      .then(response => {
        if (!response.ok) {
          throw new Error(`Could not load trips.json (${response.status})`);
        }
        return response.json();
      })
      .then(trips => {
        const yearRange = getYearRange(trips);
        const allBounds = [];

        const yearSlider = document.getElementById("year-slider");
        const yearValue = document.getElementById("year-value");
        const yearMin = document.getElementById("year-min");
        const yearMax = document.getElementById("year-max");
        const showAllBtn = document.getElementById("show-all-btn");

        yearSlider.min = yearRange.min;
        yearSlider.max = yearRange.max;
        yearSlider.value = yearRange.max;
        yearMin.textContent = yearRange.min;
        yearMax.textContent = yearRange.max;
        yearValue.textContent = yearRange.max;

        trips.forEach((trip, tripIndex) => {
          const stopPoints = trip.stops.map(stop => [stop.lat, stop.lng]);
          const routeColor = routeColors[tripIndex % routeColors.length];
          const markers = [];
          const layerGroup = L.layerGroup();

          let routeLine = null;
          if (stopPoints.length > 1) {
            routeLine = L.polyline(stopPoints, {
              color: routeColor,
              weight: 3,
              opacity: 0.45
            });
            layerGroup.addLayer(routeLine);
          }

          trip.stops.forEach((stop, stopIndex) => {
            const marker = createMarker(stop);
            marker.bindPopup(buildPopup(trip, stop, stopIndex, trip.stops.length));
            layerGroup.addLayer(marker);
            markers.push(marker);
            allBounds.push([stop.lat, stop.lng]);
          });

          layerGroup.addTo(map);

          tripLayers.push({
            trip,
            tripIndex,
            markers,
            routeLine,
            layerGroup
          });
        });

        function applyYearFilter(selectedYear) {
          clearReplay();

          const visibleBounds = [];

          tripLayers.forEach(tripData => {
            const tripYear = getTripYear(tripData.trip);
            const shouldShow = selectedYear === null || (tripYear !== null && tripYear <= selectedYear);

            if (shouldShow) {
              if (!map.hasLayer(tripData.layerGroup)) {
                tripData.layerGroup.addTo(map);
              }

              tripData.trip.stops.forEach(stop => {
                visibleBounds.push([stop.lat, stop.lng]);
              });
            } else {
              if (map.hasLayer(tripData.layerGroup)) {
                map.removeLayer(tripData.layerGroup);
              }
            }
          });

          renderTripList(
            selectedYear === null
              ? tripLayers
              : tripLayers.filter(tripData => {
                  const tripYear = getTripYear(tripData.trip);
                  return tripYear !== null && tripYear <= selectedYear;
                })
          );

          if (visibleBounds.length > 0) {
            map.fitBounds(visibleBounds, { padding: [30, 30] });
          }
        }

        yearSlider.addEventListener("input", () => {
          const selectedYear = Number(yearSlider.value);
          yearValue.textContent = selectedYear;
          applyYearFilter(selectedYear);
        });

        showAllBtn.addEventListener("click", () => {
          yearSlider.value = yearRange.max;
          yearValue.textContent = "All";
          applyYearFilter(null);
        });

        if (allBounds.length > 0) {
          map.fitBounds(allBounds, { padding: [30, 30] });
        }

        addLegend();
        renderTripList(tripLayers);
      })
      .catch(error => {
        console.error(error);
        alert("Could not load trip data. Check trips.json and try again.");
      });
  </script>
</body>
</html>
