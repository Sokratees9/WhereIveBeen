<!DOCTYPE html>
<html>
<head>
<title>Where I've Been</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([40,10],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap'
}).addTo(map);

function markerColor(type){

    if(type === "holiday") return "blue";
    if(type === "work") return "red";
    if(type === "lived") return "green";

    return "gray";
}

fetch("places.json")
.then(res => res.json())
.then(data => {

    data.forEach(place => {

        var marker = L.circleMarker(
            [place.lat, place.lng],
            {
                radius:8,
                color:markerColor(place.type),
                fillOpacity:0.8
            }
        ).addTo(map);

        var popup = "<b>"+place.name+"</b><br>";

        popup += "Type: "+place.type+"<br>";

        if(place.year)
        popup += "Date: "+place.date+"<br>";

        if(place.companions)
        popup += "With: "+place.companions+"<br>";

        if(place.notes)
        popup += place.notes;

        marker.bindPopup(popup);

    });

});

</script>

</body>
</html>
